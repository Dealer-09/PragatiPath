<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Jua&family=Noto+Sans+Mono:wght@100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&family=Red+Hat+Mono:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!--stylesheet -->
    <link rel="stylesheet" href="style.css">

    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_b3JnYW5pYy1idW5ueS00OC5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://organic-bunny-48.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript">
        </script>
</head>
<body>
    <div class="container">
        <div id="signinDiv"></div>
    </div>

    <script>
        window.addEventListener('load', async function () {
            try {
                await Clerk.load();

                Clerk.mountSignIn(document.getElementById("signinDiv"), {
                    redirectUrl: window.location.origin + "/private/Dashboard/dashboard.html",
                    appearance: {
                        variables: {
                            colorPrimary: '#2e7d32',
                            colorBackground: '#fefae0',
                            colorText: '#1b5e20',
                            colorInputBackground: '#fefae0',
                            colorInputText: '#1b5e20',
                            colorTextOnPrimaryBackground: '#ffffff',
                            fontFamily: '"Poppins", sans-serif',
                            borderRadius: '12px'
                        },
                        elements: {
                            cardBox: {
                                border: '2px solid #2e7d32',
                                borderRadius: '12px',
                                boxShadow: '0 8px 32px rgba(46, 125, 50, 0.2)'
                            },
                            formFieldInput: {
                                border: '1px solid #2e7d32'
                            }
                        }
                    }
                });

            } catch (error) {
                console.error("Clerk failed to load:", error);
            }
        });
    </script>
</body>

</html>
